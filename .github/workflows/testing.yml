name: Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel already running jobs
concurrency:
  group: testing_${{ github.head_ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Release
            cargo_profile: --release
          - name: Debug
            cargo_profile:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
      with:
        # rust-cache already handles all the sane defaults for caching rust builds.
        # However because we are running separate debug/release builds in parallel,
        # we also need to add Debug or Release to the key so that a separate cache is used.
        # Otherwise only the last build to finish would get saved to the cache.
        key: ${{ matrix.name }}
    - name: Install cargo-hack
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-hack@0.6.22
    - name: Check `cargo fmt` was run
      run: cargo fmt --all -- --check
    - name: Ensure that the library and all examples compile and have no warnings under every possible combination of features
      run: cargo hack --feature-powerset test ${{ matrix.cargo_profile }}
    - name: Ensure that tests did not create or modify any files that arent .gitignore'd
      shell: bash
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          git status
          exit 1
        fi
